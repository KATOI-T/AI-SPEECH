[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
env =
    DATABASE_URL=sqlite:///:memory:
    REDIS_URL=redis://localhost:6379
    OPENAI_API_KEY=test-openai-key
    AZURE_SPEECH_KEY=test-azure-key
    AZURE_SPEECH_REGION=japaneast
